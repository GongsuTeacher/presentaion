<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뚝딱! 발표 PPT 만들기 (V5)</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 구글 로그인 및 드라이브 접근을 위한 라이브러리 -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0fdf4; }
        .slide-card { transition: all 0.2s; }
        .slide-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #22c55e; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col relative">

    <div class="fixed bottom-4 right-6 text-gray-400 text-sm font-bold z-10 drop-shadow-sm">제작자: 석현샘</div>

    <!-- 1. 로그인 섹션 -->
    <div id="login-section" class="flex-grow flex items-center justify-center relative z-20">
        <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-lg w-full mx-4 border-t-8 border-green-500">
            <h1 class="text-2xl sm:text-3xl font-black text-green-600 mb-4 leading-snug">뚝딱! 조사한 자료로<br>발표 PPT 만들기</h1>
            <p class="text-gray-500 mb-8 font-medium break-keep">발표내용을 구상하고 자료내용을 알려주시면,<br>PPT는 제가 만들어 드릴게요.</p>
            <button id="login-btn" onclick="startApp()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 text-gray-700 p-4 rounded-xl font-bold hover:bg-gray-50 transition shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6">
                시작하기
            </button>
        </div>
    </div>

    <!-- 2. 메인 앱 섹션 -->
    <div id="app-section" class="hidden flex-grow flex flex-col items-center py-8 px-4 w-full max-w-5xl mx-auto relative z-20">
        
        <div class="w-full bg-white p-6 rounded-2xl shadow-sm mb-6 border-2 border-blue-200">
            <h2 class="text-xl font-black text-blue-600 mb-2 flex items-center gap-2">
                <i data-lucide="key"></i> 선생님이 주신 마법의 열쇠(API 키)를 넣어주세요!
            </h2>
            <p class="text-xs text-gray-500 mb-4">한 번만 붙여넣으면 기기가 기억합니다. (코드 유출 위험 0%)</p>
            <div class="flex flex-col sm:flex-row items-center gap-3">
                <input type="password" id="api-key-input" placeholder="여기에 API 키를 붙여넣으세요 (AIzaSy...)" class="w-full sm:w-2/3 border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 bg-gray-50">
                <button onclick="testAPI()" class="w-full sm:w-1/3 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2 transition shadow-sm">
                    <i data-lucide="zap"></i> 연결 테스트
                </button>
            </div>
            <div id="test-result" class="mt-4 p-4 rounded-lg bg-gray-100 text-sm font-bold whitespace-pre-wrap hidden"></div>
        </div>

        <div class="w-full flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6 border border-green-100">
            <div class="flex items-center gap-3">
                <div class="bg-green-100 p-2 rounded-lg text-green-600"><i data-lucide="presentation" class="w-6 h-6"></i></div>
                <h2 class="text-xl font-bold text-gray-800">뚝딱! 조사한 자료로 발표 PPT 만들기</h2>
            </div>
            <button onclick="logoutApp()" class="text-sm text-red-500 hover:text-red-700 font-bold bg-red-50 px-3 py-1.5 rounded-lg transition">처음으로</button>
        </div>

        <div class="w-full grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <label class="block text-lg font-bold text-gray-800 mb-2">어떤 주제로 발표하나요?</label>
                    <input type="text" id="presentation-topic" placeholder="예) 여러 종류의 고양이 알아보기" class="w-full border-2 border-gray-200 rounded-xl p-3 text-lg focus:outline-none focus:border-green-500 transition">
                </div>
                <div id="slides-container" class="space-y-4"></div>
                <button onclick="addSlide()" class="w-full border-2 border-dashed border-green-300 text-green-600 bg-green-50 hover:bg-green-100 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition">
                    <i data-lucide="plus-circle"></i> 새로운 슬라이드 추가하기
                </button>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-md border-t-8 border-green-400 sticky top-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">완성하기</h3>
                    <p class="text-sm text-gray-600 mb-6 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        작성한 내용을 바탕으로 AI가 발표하기 좋게 문장을 <b>아주 짧게</b> 다듬어 줍니다.
                    </p>
                    <div class="space-y-3">
                        <button onclick="generateWithAI()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm transition">
                            <i data-lucide="sparkles"></i> AI로 내용 요약하기
                        </button>
                        <button onclick="downloadPPT(false)" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm transition">
                            <i data-lucide="download"></i> 컴퓨터에 PPT 다운받기
                        </button>
                        <button onclick="downloadPPT(true)" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm transition">
                            <i data-lucide="cloud-lightning"></i> 바로 구글 슬라이드 만들기
                        </button>
                    </div>
                    <div id="status-message" class="mt-4 text-center text-sm font-medium hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center text-white z-[100]">
        <div class="loader mb-4"></div>
        <p id="loading-text" class="text-lg font-bold text-center leading-relaxed">처리 중입니다...</p>
    </div>

    <script>
        lucide.createIcons();

        // ==============================================================================
        // ★ 선생님께서 발급받은 진짜 클라이언트 ID 완벽 적용 완료! ★
        // ==============================================================================
        const GOOGLE_CLIENT_ID = "200049222670-mk2gmlucjsdq5cn0lb629lhtdob3o91u.apps.googleusercontent.com";

        let tokenClient;
        let gapiAccessToken = null;

        // Google Identity Services (GIS) 초기화
        window.onload = function () {
            if (typeof google !== 'undefined' && google.accounts) {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/drive.file',
                    callback: (tokenResponse) => {
                        if (tokenResponse && tokenResponse.access_token) {
                            gapiAccessToken = tokenResponse.access_token;
                            if (pendingUploadData && pendingUploadName) {
                                uploadToGoogleDrive(pendingUploadData, pendingUploadName);
                            }
                        }
                    }
                });
            }
        };

        function startApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
        }
        function logoutApp() {
            window.location.reload();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('geminiApiKey_saved');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
            }
        });

        let slidesData = [
            { id: 1, title: '', content: '', types: ['text'], aiRefined: null }
        ];

        // AI 모델 탐색 로직
        async function autoFetchGemini(apiKey, promptText) {
            const modelsToTry = [
                'gemini-3-flash', 
                'gemini-2.5-flash', 
                'gemini-2.0-flash', 
                'gemini-1.5-flash', 
                'gemini-pro'
            ];
            let lastErrorMsg = "";

            for (let i = 0; i < modelsToTry.length; i++) {
                const model = modelsToTry[i];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        return { success: true, text: data.candidates[0].content.parts[0].text, model: model };
                    }

                    const errData = await response.json();
                    const errMsg = errData.error?.message || "알 수 없는 오류";

                    if (errMsg.includes("not found") || errMsg.includes("is not supported")) {
                        lastErrorMsg = errMsg;
                        continue; 
                    } else {
                        throw new Error(`API 오류: ${errMsg}`);
                    }
                } catch (error) {
                    if (error.message.includes("API 오류:")) { throw error; }
                    lastErrorMsg = error.message;
                }
            }
            throw new Error(`사용 가능한 AI 모델을 찾지 못했습니다. (마지막 에러: ${lastErrorMsg})`);
        }

        async function testAPI() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            const resultBox = document.getElementById('test-result');
            resultBox.classList.remove('hidden');
            resultBox.className = "mt-4 p-4 rounded-lg bg-yellow-100 text-yellow-800 text-sm font-bold";
            resultBox.textContent = "구글 서버에 연결 중입니다... 작동하는 AI 모델을 찾는 중입니다!";

            if (!apiKey) {
                resultBox.className = "mt-4 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold";
                resultBox.textContent = "API 키를 붙여넣어 주세요!";
                return;
            }

            try {
                const result = await autoFetchGemini(apiKey, "안녕? 넌 이름이 뭐야?");
                localStorage.setItem('geminiApiKey_saved', apiKey);
                resultBox.className = "mt-4 p-4 rounded-lg bg-blue-100 text-blue-800 text-sm font-bold";
                resultBox.innerHTML = `✅ 연결 성공!<br>선생님의 키에 딱 맞는 <b>${result.model}</b> 모델을 찾아 연결했습니다.<br>이제 자유롭게 PPT를 만드세요!`;
            } catch (error) {
                resultBox.className = "mt-4 p-4 rounded-lg bg-red-100 text-red-800 text-sm font-bold whitespace-pre-wrap";
                resultBox.textContent = `❌ ${error.message}`;
            }
        }

        function renderSlides() {
            const container = document.getElementById('slides-container');
            container.innerHTML = '';
            slidesData.forEach((slide, index) => {
                const isRefined = slide.aiRefined !== null;
                const slideHTML = `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border ${isRefined ? 'border-green-400 bg-green-50/30' : 'border-gray-200'} slide-card relative">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-bold text-green-600 flex items-center gap-2">
                                <span class="bg-green-100 text-green-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">${index + 1}</span>
                                슬라이드
                            </h4>
                            ${index > 0 ? `<button onclick="removeSlide(${slide.id})" class="text-gray-400 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                        </div>
                        <div class="space-y-3">
                            <div><input type="text" value="${slide.title}" onchange="updateSlide(${slide.id}, 'title', this.value)" placeholder="이 슬라이드의 소주제 (예: 양양 송이의 특징)" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-green-500"></div>
                            <div><textarea rows="3" onchange="updateSlide(${slide.id}, 'content', this.value)" placeholder="조사한 내용을 자유롭게 적어주세요. AI가 핵심만 아주 짧게 요약해 줍니다." class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-green-500 resize-none">${slide.content}</textarea></div>
                            <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <label class="text-sm font-bold text-gray-700 whitespace-nowrap">어떤 자료가 들어갈까요? (중복 선택)</label>
                                <div class="flex flex-wrap gap-4 text-sm text-gray-800">
                                    <label class="flex items-center gap-1.5 cursor-pointer hover:text-green-700"><input type="checkbox" onchange="toggleSlideType(${slide.id}, 'text')" ${slide.types.includes('text') ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500"><span>📝 글</span></label>
                                    <label class="flex items-center gap-1.5 cursor-pointer hover:text-green-700"><input type="checkbox" onchange="toggleSlideType(${slide.id}, 'image')" ${slide.types.includes('image') ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500"><span>🖼️ AI 사진/그림</span></label>
                                    <label class="flex items-center gap-1.5 cursor-pointer hover:text-green-700"><input type="checkbox" onchange="toggleSlideType(${slide.id}, 'chart')" ${slide.types.includes('chart') ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500"><span>📊 표/그래프 (빈칸)</span></label>
                                </div>
                            </div>
                            ${isRefined ? `
                            <div class="mt-4 p-4 bg-green-100/50 rounded-xl border border-green-200">
                                <h5 class="text-xs font-bold text-green-700 mb-2 flex items-center gap-1"><i data-lucide="bot" class="w-4 h-4"></i> AI가 추천하는 발표 내용 (개조식 요약)</h5>
                                <ul class="list-disc list-inside text-sm text-gray-800 space-y-1 mb-3 font-medium">
                                    ${slide.aiRefined.bulletPoints.map(bp => `<li>${bp}</li>`).join('')}
                                </ul>
                                ${slide.types.includes('image') && slide.aiRefined.imagePrompt ? `
                                <div class="flex items-center gap-2 mb-3 bg-blue-50 text-blue-700 p-2 rounded text-xs font-bold border border-blue-100">
                                    <i data-lucide="image" class="w-4 h-4"></i> PPT를 만들 때 AI가 이 내용에 어울리는 그림을 자동으로 그려서 넣어줍니다!
                                </div>` : ''}
                                <h5 class="text-xs font-bold text-blue-700 mb-1">🎤 발표 대본 (스피커 노트)</h5>
                                <p class="text-sm text-gray-700 bg-white p-2 rounded border border-blue-100">${slide.aiRefined.speakerNotes}</p>
                            </div>` : ''}
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', slideHTML);
            });
            lucide.createIcons();
        }

        function addSlide() {
            const newId = slidesData.length > 0 ? Math.max(...slidesData.map(s => s.id)) + 1 : 1;
            slidesData.push({ id: newId, title: '', content: '', types: ['text'], aiRefined: null });
            renderSlides();
        }
        function removeSlide(id) { slidesData = slidesData.filter(s => s.id !== id); renderSlides(); }
        function updateSlide(id, field, value) { const slide = slidesData.find(s => s.id === id); if (slide) { slide[field] = value; slide.aiRefined = null; } }
        function toggleSlideType(id, type) { const slide = slidesData.find(s => s.id === id); if (slide) { if (slide.types.includes(type)) { slide.types = slide.types.filter(t => t !== type); } else { slide.types.push(type); } slide.aiRefined = null; } }

        function showLoading(text) { 
            document.getElementById('loading-text').innerHTML = text.replace(/\n/g, '<br>'); 
            document.getElementById('loading-overlay').classList.remove('hidden'); 
            document.getElementById('loading-overlay').classList.add('flex'); 
        }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); document.getElementById('loading-overlay').classList.remove('flex'); }
        function showMessage(msg, isError = false, duration = 8000) {
            const el = document.getElementById('status-message');
            el.innerHTML = msg.replace(/\n/g, '<br>');
            el.className = `mt-4 text-center text-sm font-bold p-4 rounded-lg leading-relaxed ${isError ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-blue-100 text-blue-700'}`;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), duration);
        }

        // 3. AI 변환 함수 (선생님 요청사항 프롬프트 완벽 반영!)
        async function generateWithAI() {
            const currentApiKey = document.getElementById('api-key-input').value.trim();
            const topic = document.getElementById('presentation-topic').value.trim();

            if (!currentApiKey) { showMessage("맨 위에서 API 키를 먼저 입력해주세요!", true, 3000); return; }
            if (!topic) { showMessage("발표 주제를 먼저 입력해주세요!", true, 3000); document.getElementById('presentation-topic').focus(); return; }
            
            const emptySlide = slidesData.find(s => !s.title || !s.content);
            if (emptySlide) { showMessage("모든 슬라이드의 소주제와 내용을 작성해주세요!", true, 3000); return; }

            showLoading("AI가 초등학생 눈높이에 맞게 내용을 다듬고 있어요...");
            
            // ★ 프롬프트 변경점: '~해요' 체를 완전히 빼고, 명사나 개조식으로 끝내도록 매우 강하게 지시합니다.
            // 추가로 이미지를 생성할 수 있는 영어 프롬프트(imagePrompt)를 지시했습니다.
            const prompt = `너는 초등학교 5학년 학생들의 국어 '자료를 조사하여 발표해요' 단원 학습을 돕는 친절한 AI 선생님이야. 
            학생이 입력한 [발표 주제]와 [슬라이드별 메모]를 보고, 실제 PPT 슬라이드에 들어갈 '개조식 문장(bullet points)', 발표할 때 읽을 '발표 대본(speakerNotes)', 그리고 슬라이드에 어울리는 '그림 생성용 영어 프롬프트(imagePrompt)'를 만들어줘.

            [매우 중요한 규칙]
            1. bulletPoints: PPT 화면에 들어갈 글씨이므로 반드시 '~해요', '~습니다', '~입니다' 같은 대화체 서술어를 모두 빼버려. 무조건 명사(예: ~고양이, ~특징) 또는 '~함', '~임'으로 끝나는 아주 짧고 간결한 개조식 단답형 문장으로만 2~3줄 작성해. (절대 문장형으로 길게 쓰지 말 것)
            2. speakerNotes: 초등학교 5학년이 반 친구들 앞에서 발표할 때 읽을 대본이므로, 친절한 존댓말(~했습니다, ~해요)로 자연스럽게 작성해.
            3. imagePrompt: 이 슬라이드의 내용을 잘 표현하는 수채화나 일러스트 느낌의 그림을 AI가 그릴 수 있도록 영어로 된 프롬프트를 1~2문장으로 짧게 작성해줘. (예: A cute watercolor illustration of a Korean Shorthair cat)

            [발표 주제]: ${topic} 
            [슬라이드별 메모]: ${JSON.stringify(slidesData.map(s => ({ id: s.id, title: s.title, content: s.content, types: s.types })))} 

            반드시 아래의 JSON 배열 형식으로만 응답해. 백틱(\`\`\`) 없이 순수 JSON만 반환해.
            [
              {
                "id": 슬라이드 아이디(숫자),
                "bulletPoints": ["러시안 블루: 은회색 털과 에메랄드 눈", "코리안 숏헤어: 우리나라에서 가장 많이 키우는 고양이"],
                "speakerNotes": "여러분 안녕하세요! 이 슬라이드에서는...",
                "imagePrompt": "A cute watercolor illustration of a Russian Blue cat..."
              }
            ]`;

            try {
                const result = await autoFetchGemini(currentApiKey, prompt);
                let resultText = result.text;
                let refinedData;
                
                try {
                    resultText = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
                    refinedData = JSON.parse(resultText);
                } catch(e) { 
                    throw new Error("AI가 답변을 만들다가 엉뚱한 말을 섞었습니다. 버튼을 다시 한 번 눌러주세요!"); 
                }

                refinedData.forEach(refined => { 
                    const slide = slidesData.find(s => s.id === refined.id); 
                    if (slide) { 
                        slide.aiRefined = { 
                            bulletPoints: refined.bulletPoints, 
                            speakerNotes: refined.speakerNotes,
                            imagePrompt: refined.imagePrompt 
                        }; 
                    } 
                });
                renderSlides();
                showMessage(`✨ AI가 내용을 개조식으로 완벽하게 요약했습니다! (${result.model} 사용)`, false, 5000);
                
            } catch (error) { 
                showMessage(`${error.message}`, true);
            } finally { 
                hideLoading();
            }
        }

        // 인터넷 상의 이미지를 Base64(PPT 삽입용 데이터)로 변환하는 함수
        async function getBase64ImageFromUrl(imageUrl) {
            try {
                const res = await fetch(imageUrl);
                if (!res.ok) throw new Error('Network response was not ok');
                const blob = await res.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error("그림 생성 에러:", e);
                return null;
            }
        }

        // 다운로드 전역 변수 (업로드 시 사용)
        let pendingUploadData = null;
        let pendingUploadName = null;

        // 4. PPT 다운로드 & 구글 슬라이드 연동 메인 함수 (AI 이미지 생성 포함)
        async function downloadPPT(openGoogleSlides) {
            const topic = document.getElementById('presentation-topic').value.trim();
            if (!topic) { showMessage("발표 주제를 먼저 입력해주세요!", true, 3000); return; }

            const needsAI = slidesData.some(s => s.aiRefined === null);
            if (needsAI) { showMessage("💡 AI로 다듬지 않은 슬라이드는 입력하신 글 그대로 포함됩니다.", false, 4000); }

            showLoading("멋진 슬라이드 파일을 만들 준비를 하고 있습니다...");

            try {
                let pres = new PptxGenJS();
                pres.layout = 'LAYOUT_16x9';
                pres.defineSlideMaster({
                    title: "MASTER_SLIDE",
                    background: { color: "FFFFFF" },
                    objects: [
                        { rect: { x: 0, y: 0, w: '100%', h: 0.5, fill: { color: "22C55E" } } },
                        { text: { text: "발표 자료", options: { x: 0.5, y: 0.1, w: 3, h: 0.3, color: "FFFFFF", fontSize: 10 } } }
                    ]
                });

                let titleSlide = pres.addSlide({ masterName: "MASTER_SLIDE" });
                titleSlide.addText(topic, { x: 1, y: 2, w: 8, h: 1.5, fontSize: 44, bold: true, color: "1F2937", align: "center" });
                titleSlide.addText(`발표자: 5학년`, { x: 1, y: 3.5, w: 8, h: 1, fontSize: 24, color: "4B5563", align: "center" });

                // 각 슬라이드 순회 처리 (이미지 생성 대기 때문에 for...of 사용)
                for (let i = 0; i < slidesData.length; i++) {
                    const slideData = slidesData[i];
                    let slide = pres.addSlide({ masterName: "MASTER_SLIDE" });
                    slide.addText(slideData.title || "제목 없음", { x: 0.5, y: 0.8, w: 9, h: 0.8, fontSize: 32, bold: true, color: "166534" });

                    const hasText = slideData.types.includes('text');
                    const hasImage = slideData.types.includes('image');
                    const hasChart = slideData.types.includes('chart');
                    const hasMedia = hasImage || hasChart;

                    let contentOptions = { x: 0.5, y: 1.8, w: 9, h: 3.5, fontSize: 20, color: "374151", valign: "top" };
                    if (hasMedia && hasText) { contentOptions.w = 4.5; }

                    if (hasText || slideData.aiRefined) {
                        let textContent = "";
                        if (slideData.aiRefined) {
                            textContent = slideData.aiRefined.bulletPoints.join('\n');
                            contentOptions.bullet = true;
                            slide.addNotes(slideData.aiRefined.speakerNotes || "");
                        } else {
                            textContent = slideData.content;
                            contentOptions.bullet = false;
                        }
                        slide.addText(textContent, contentOptions);
                    }

                    if (hasMedia) {
                        let mediaX = hasText ? 5.5 : 2.5;
                        let mediaW = hasText ? 4 : 5;
                        
                        // ★ 마법의 AI 그림 생성 및 삽입 파트 ★
                        if (hasImage && slideData.aiRefined && slideData.aiRefined.imagePrompt) {
                            showLoading(`🎨 슬라이드 ${i + 1}의 멋진 그림을 AI가 그리고 있어요...\n<span class="text-sm font-normal text-gray-200">(약 5~10초 정도 걸립니다. 잠시만 기다려주세요!)</span>`);
                            
                            // Pollinations 무료 이미지 생성 AI API 사용 (로그인 불필요, 즉시 생성)
                            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(slideData.aiRefined.imagePrompt)}?width=800&height=600&nologo=true`;
                            const base64Img = await getBase64ImageFromUrl(imageUrl);
                            
                            if (base64Img) {
                                slide.addImage({ data: base64Img, x: mediaX, y: 1.8, w: mediaW, h: 3, sizing: { type: 'contain' } });
                            } else {
                                slide.addShape(pres.ShapeType.rect, { x: mediaX, y: 1.8, w: mediaW, h: 3, fill: { color: "F3F4F6" }, line: { color: "D1D5DB", width: 1 } });
                                slide.addText("그림 생성 실패", { x: mediaX, y: 1.8, w: mediaW, h: 3, align: "center", color: "9CA3AF", fontSize: 16 });
                            }
                        } 
                        // 그림 생성이 아닐 경우(표/그래프) 원래대로 네모 박스 표시
                        else {
                            let mediaText = (hasImage && hasChart) ? "사진/그림 및 표/그래프 삽입 공간" : (hasImage ? "사진/그림 삽입 공간" : "표/그래프 삽입 공간");
                            slide.addShape(pres.ShapeType.rect, { x: mediaX, y: 1.8, w: mediaW, h: 3, fill: { color: "F3F4F6" }, line: { color: "D1D5DB", width: 1 } });
                            slide.addText(mediaText, { x: mediaX, y: 1.8, w: mediaW, h: 3, align: "center", color: "9CA3AF", fontSize: 16 });
                        }
                    }
                }

                let endSlide = pres.addSlide({ masterName: "MASTER_SLIDE" });
                endSlide.addText("경청해 주셔서 감사합니다!", { x: 1, y: 2.5, w: 8, h: 1.5, fontSize: 40, bold: true, color: "1F2937", align: "center" });

                const fileName = `${topic}_발표자료.pptx`;

                if (openGoogleSlides) {
                    showLoading("구글 슬라이드로 파일을 전송할 준비를 하고 있습니다...");
                    const base64Data = await pres.write('base64');
                    pendingUploadData = base64Data;
                    pendingUploadName = fileName;
                    
                    if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === "200049222670-mk2gmlucjsdq5cn0lb629lhtdob3o91u.apps.googleusercontent.com") {
                        throw new Error("코드 상단에 구글 클라이언트 ID가 입력되지 않았습니다.");
                    }

                    if (!gapiAccessToken) {
                        hideLoading();
                        tokenClient.requestAccessToken();
                    } else {
                        uploadToGoogleDrive(pendingUploadData, pendingUploadName);
                    }

                } else {
                    showLoading("컴퓨터에 PPT 파일을 저장하는 중입니다...");
                    await pres.writeFile({ fileName: fileName });
                    showMessage("✅ 컴퓨터에 PPT 파일이 저장되었습니다!", false, 5000);
                    hideLoading();
                }

            } catch (error) {
                console.error(error);
                showMessage(`앗, 오류가 났어요! 😭 (${error.message})`, true, 5000);
                hideLoading();
            }
        }

        async function uploadToGoogleDrive(base64Data, filename) {
            showLoading(`구글 드라이브에 안전하게 업로드하고 슬라이드로 변환 중입니다...\n<span class="text-sm font-normal text-gray-200">창을 닫지 마세요!</span>`);
            try {
                const metadata = {
                    name: filename,
                    mimeType: 'application/vnd.google-apps.presentation' 
                };

                const boundary = '-------314159265358979323846';
                const delimiter = "\r\n--" + boundary + "\r\n";
                const close_delim = "\r\n--" + boundary + "--";

                const multipartRequestBody =
                    delimiter +
                    'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                    JSON.stringify(metadata) +
                    delimiter +
                    'Content-Type: application/vnd.openxmlformats-officedocument.presentationml.presentation\r\n' +
                    'Content-Transfer-Encoding: base64\r\n\r\n' +
                    base64Data +
                    close_delim;

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + gapiAccessToken,
                        'Content-Type': 'multipart/related; boundary=' + boundary
                    },
                    body: multipartRequestBody
                });

                if (!response.ok) {
                    throw new Error("구글 드라이브 업로드에 실패했습니다. 테스트 사용자 이메일이 정확히 등록되었는지 확인해 주세요.");
                }

                const fileInfo = await response.json();
                
                window.open(`https://docs.google.com/presentation/d/${fileInfo.id}/edit`, '_blank');
                showMessage("✅ 구글 슬라이드 생성이 완료되었습니다! 새로 뜬 창을 확인해 주세요.", false, 8000);
                
                pendingUploadData = null;
                pendingUploadName = null;

            } catch (error) {
                console.error(error);
                showMessage(`업로드 오류: ${error.message}`, true, 6000);
            } finally {
                hideLoading();
            }
        }

    </script>

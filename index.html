<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뚝딱! 발표 PPT 만들기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- PptxGenJS (PPT 생성 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    <!-- 아이콘 -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0fdf4; }
        .slide-card { transition: all 0.2s; }
        .slide-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #22c55e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col relative">

    <!-- 오른쪽 아래 제작자 표시 -->
    <div class="fixed bottom-4 right-6 text-gray-400 text-sm font-bold z-10 drop-shadow-sm">
        제작자: 석현샘
    </div>

    <!-- Firebase SDK 로드 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 선생님의 실제 Firebase 프로젝트 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAVzj49_O4mVmrADzMcK7itRT-iBJ30gaw",
            authDomain: "presentaion-43d7d.firebaseapp.com",
            projectId: "presentaion-43d7d",
            storageBucket: "presentaion-43d7d.firebasestorage.app",
            messagingSenderId: "581142096722",
            appId: "1:581142096722:web:6df52fbb78957b001be88b"
        };

        // 초기화
        let auth, provider;
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            provider = new GoogleAuthProvider();
            
            // 로그인 상태 감지
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                    document.getElementById('user-name').textContent = `${user.displayName}님, 환영합니다!`;
                } else {
                    document.getElementById('login-section').classList.remove('hidden');
                    document.getElementById('app-section').classList.add('hidden');
                }
            });
        } catch (error) {
            console.warn("Firebase가 아직 설정되지 않았습니다. 임시 로그인 모드로 진행합니다.");
            // 테스트용 임시 로그인 처리
            document.getElementById('login-btn').addEventListener('click', () => {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                document.getElementById('user-name').textContent = `환영합니다! (테스트 모드)`;
            });
        }

        // 구글 로그인 함수
        window.handleLogin = () => {
            if(auth) {
                signInWithPopup(auth, provider).catch((error) => {
                    showMessage("로그인 중 오류가 발생했습니다.", true);
                });
            }
        };

        window.handleLogout = () => {
            if(auth) {
                signOut(auth);
            } else {
                window.location.reload();
            }
        };
    </script>

    <!-- 1. 로그인 섹션 -->
    <div id="login-section" class="flex-grow flex items-center justify-center relative z-20">
        <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-lg w-full mx-4 border-t-8 border-green-500">
            <h1 class="text-2xl sm:text-3xl font-black text-green-600 mb-4 leading-snug">뚝딱! 조사한 자료로<br>발표 PPT 만들기</h1>
            <p class="text-gray-500 mb-8 font-medium break-keep">발표내용을 구상하고 자료내용을 알려주시면,<br>PPT는 제가 만들어 드릴게요.</p>
            <button id="login-btn" onclick="handleLogin()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 text-gray-700 p-4 rounded-xl font-bold hover:bg-gray-50 transition shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-6 h-6">
                구글 계정으로 시작하기
            </button>
        </div>
    </div>

    <!-- 2. 메인 앱 섹션 (로그인 후 표시) -->
    <div id="app-section" class="hidden flex-grow flex flex-col items-center py-8 px-4 w-full max-w-5xl mx-auto relative z-20">
        
        <!-- 상단 헤더 -->
        <div class="w-full flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6 border border-green-100">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <div class="bg-green-100 p-2 rounded-lg text-green-600">
                    <i data-lucide="presentation" class="w-6 h-6"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">나만의 발표자료 만들기</h2>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-name" class="font-medium text-gray-600 text-sm"></span>
                <button onclick="handleLogout()" class="text-sm text-red-500 hover:text-red-700 font-bold bg-red-50 px-3 py-1.5 rounded-lg transition">로그아웃</button>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 -->
        <div class="w-full grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
            
            <!-- 좌측: 입력 폼 -->
            <div class="lg:col-span-2 space-y-4">
                
                <!-- 발표 주제 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <label class="block text-lg font-bold text-gray-800 mb-2">어떤 주제로 발표하나요?</label>
                    <input type="text" id="presentation-topic" placeholder="예) 우리 동네 양양의 자랑거리 소개하기" class="w-full border-2 border-gray-200 rounded-xl p-3 text-lg focus:outline-none focus:border-green-500 transition">
                </div>

                <!-- 슬라이드 목록 -->
                <div id="slides-container" class="space-y-4">
                    <!-- 슬라이드가 여기에 동적으로 추가됩니다 -->
                </div>

                <!-- 슬라이드 추가 버튼 -->
                <button onclick="addSlide()" class="w-full border-2 border-dashed border-green-300 text-green-600 bg-green-50 hover:bg-green-100 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition">
                    <i data-lucide="plus-circle"></i> 새로운 슬라이드 추가하기
                </button>
            </div>

            <!-- 우측: AI 변환 및 다운로드 패널 -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-md border-t-8 border-green-400 sticky top-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">완성하기</h3>
                    
                    <p class="text-sm text-gray-600 mb-6 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        작성한 내용을 바탕으로 AI가 발표하기 좋게 문장을 다듬어 줍니다. 그 다음 진짜 파워포인트(PPT) 파일로 다운로드 하세요!
                    </p>

                    <div class="space-y-3">
                        <button onclick="generateWithAI()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm transition">
                            <i data-lucide="sparkles"></i> AI로 내용 다듬기
                        </button>
                        
                        <button onclick="downloadPPT()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm transition">
                            <i data-lucide="download"></i> 조사자료 PPT로 만들기
                        </button>
                    </div>

                    <!-- 상태 표시창 (알림창 대체) -->
                    <div id="status-message" class="mt-4 text-center text-sm font-medium hidden">
                        <!-- 메시지 표시 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 로딩 오버레이 -->
    <div id="loading-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex-col items-center justify-center text-white">
        <div class="loader mb-4"></div>
        <p id="loading-text" class="text-lg font-bold">AI가 아이디어를 다듬고 있어요...</p>
    </div>

    <!-- 스크립트 로직 -->
    <script>
        // ★ 중요: 이곳에는 Firebase 키가 아닌, Google AI Studio에서 발급받은 Gemini API 키를 넣으셔야 합니다! ★
        const GEMINI_API_KEY = "AIzaSyAcrwDM4d_z_FdMVdkJMiAZE6ot1LkB3nY";

        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 슬라이드 데이터 상태 관리
        let slidesData = [
            { id: 1, title: '', content: '', types: ['text'], aiRefined: null }
        ];

        // 슬라이드 렌더링 함수
        function renderSlides() {
            const container = document.getElementById('slides-container');
            container.innerHTML = '';

            slidesData.forEach((slide, index) => {
                const isRefined = slide.aiRefined !== null;
                
                const slideHTML = `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border ${isRefined ? 'border-green-400 bg-green-50/30' : 'border-gray-200'} slide-card relative">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-bold text-green-600 flex items-center gap-2">
                                <span class="bg-green-100 text-green-700 w-6 h-6 rounded-full flex items-center justify-center text-xs">${index + 1}</span>
                                슬라이드
                            </h4>
                            ${index > 0 ? `<button onclick="removeSlide(${slide.id})" class="text-gray-400 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                        </div>

                        <div class="space-y-3">
                            <div>
                                <input type="text" value="${slide.title}" onchange="updateSlide(${slide.id}, 'title', this.value)" placeholder="이 슬라이드의 소주제 (예: 양양 송이의 특징)" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-green-500">
                            </div>
                            
                            <div>
                                <textarea rows="3" onchange="updateSlide(${slide.id}, 'content', this.value)" placeholder="조사한 내용을 자유롭게 적어주세요. AI가 멋지게 요약해 줍니다." class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:border-green-500 resize-none">${slide.content}</textarea>
                            </div>

                            <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                <label class="text-sm font-bold text-gray-700 whitespace-nowrap">이 슬라이드에 어떤 자료가 들어갈까요? (중복 선택 가능)</label>
                                <div class="flex flex-wrap gap-4 text-sm text-gray-800">
                                    <label class="flex items-center gap-1.5 cursor-pointer hover:text-green-700">
                                        <input type="checkbox" onchange="toggleSlideType(${slide.id}, 'text')" ${slide.types.includes('text') ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500">
                                        <span>📝 글</span>
                                    </label>
                                    <label class="flex items-center gap-1.5 cursor-pointer hover:text-green-700">
                                        <input type="checkbox" onchange="toggleSlideType(${slide.id}, 'image')" ${slide.types.includes('image') ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500">
                                        <span>🖼️ 사진/그림</span>
                                    </label>
                                    <label class="flex items-center gap-1.5 cursor-pointer hover:text-green-700">
                                        <input type="checkbox" onchange="toggleSlideType(${slide.id}, 'chart')" ${slide.types.includes('chart') ? 'checked' : ''} class="w-4 h-4 text-green-600 rounded border-gray-300 focus:ring-green-500">
                                        <span>📊 표/그래프</span>
                                    </label>
                                </div>
                            </div>

                            ${isRefined ? `
                            <div class="mt-4 p-4 bg-green-100/50 rounded-xl border border-green-200">
                                <h5 class="text-xs font-bold text-green-700 mb-2 flex items-center gap-1"><i data-lucide="bot" class="w-4 h-4"></i> AI가 추천하는 발표 내용</h5>
                                <ul class="list-disc list-inside text-sm text-gray-800 space-y-1 mb-3">
                                    ${slide.aiRefined.bulletPoints.map(bp => `<li>${bp}</li>`).join('')}
                                </ul>
                                <h5 class="text-xs font-bold text-blue-700 mb-1">🎤 발표 대본 (스피커 노트)</h5>
                                <p class="text-sm text-gray-700 bg-white p-2 rounded border border-blue-100">${slide.aiRefined.speakerNotes}</p>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', slideHTML);
            });
            lucide.createIcons();
        }

        // 슬라이드 조작 함수들
        function addSlide() {
            const newId = slidesData.length > 0 ? Math.max(...slidesData.map(s => s.id)) + 1 : 1;
            slidesData.push({ id: newId, title: '', content: '', types: ['text'], aiRefined: null });
            renderSlides();
        }

        function removeSlide(id) {
            slidesData = slidesData.filter(s => s.id !== id);
            renderSlides();
        }

        function updateSlide(id, field, value) {
            const slide = slidesData.find(s => s.id === id);
            if (slide) {
                slide[field] = value;
                slide.aiRefined = null; // 내용이 바뀌면 AI 결과 초기화
            }
        }

        function toggleSlideType(id, type) {
            const slide = slidesData.find(s => s.id === id);
            if (slide) {
                if (slide.types.includes(type)) {
                    slide.types = slide.types.filter(t => t !== type);
                } else {
                    slide.types.push(type);
                }
                slide.aiRefined = null; // 내용이 바뀌면 AI 결과 초기화
            }
        }

        // 로딩 UI 제어
        function showLoading(text) {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-overlay').classList.add('flex');
        }

        function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('loading-overlay').classList.remove('flex');
        }

        // 화면에 알림창 대신 메시지를 표시하는 함수 (버그 수정의 핵심!)
        function showMessage(msg, isError = false) {
            const el = document.getElementById('status-message');
            el.textContent = msg;
            el.className = `mt-4 text-center text-sm font-bold p-3 rounded-lg ${isError ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`;
            el.classList.remove('hidden');
            // 5초 후 메시지 숨김
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        // Gemini AI 호출 함수
        async function generateWithAI() {
            const topic = document.getElementById('presentation-topic').value.trim();

            // 1. API 키 확인
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "선생님의_API_키를_여기에_붙여넣으세요") {
                showMessage("오류: 코드 안에 Gemini API 키가 없습니다!", true);
                return;
            }

            // 2. 주제 확인
            if (!topic) {
                showMessage("발표 주제를 먼저 입력해주세요!", true);
                document.getElementById('presentation-topic').focus();
                return;
            }

            // 3. 빈 슬라이드 검사
            const emptySlide = slidesData.find(s => !s.title || !s.content);
            if (emptySlide) {
                showMessage("모든 슬라이드의 소주제와 내용을 작성해주세요!", true);
                return;
            }

            showLoading("AI가 초등학생 눈높이에 맞게 내용을 다듬고 있어요...");

            const prompt = `
            너는 초등학교 5학년 학생들의 국어 '자료를 조사하여 발표해요' 단원 학습을 돕는 친절한 AI 선생님이야.
            학생이 입력한 [발표 주제]와 [슬라이드별 메모]를 보고, 실제 PPT 슬라이드에 들어갈 간결한 '개조식 문장(bullet points)'과 발표할 때 읽을 '발표 대본(speakerNotes)'을 만들어줘.
            초등학교 5학년 수준에 맞는 쉬운 어휘를 사용하고, 친근한 존댓말(~했습니다, ~해요)로 대본을 써줘.

            [발표 주제]: ${topic}
            [슬라이드별 메모]:
            ${JSON.stringify(slidesData.map(s => ({ id: s.id, title: s.title, content: s.content, types: s.types })))}

            반드시 아래의 JSON 배열 형식으로만 응답해.
            [
              {
                "id": 슬라이드 아이디(숫자),
                "bulletPoints": ["핵심 문장 1 (간결하게)", "핵심 문장 2", "핵심 문장 3"],
                "speakerNotes": "여러분 안녕하세요! 이 슬라이드에서는..."
              }
            ]
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "API 인증 오류(키가 잘못되었을 수 있습니다.)");
                }

                const data = await response.json();
                let resultText = data.candidates[0].content.parts[0].text;
                
                // JSON 파싱 (AI가 불필요한 말을 붙여도 JSON만 찾아내도록 강화)
                const jsonMatch = resultText.match(/\[[\s\S]*\]/);
                if (!jsonMatch) throw new Error("AI가 올바른 형식으로 답변하지 않았습니다.");
                
                const refinedData = JSON.parse(jsonMatch[0]);

                // 상태 업데이트
                refinedData.forEach(refined => {
                    const slide = slidesData.find(s => s.id === refined.id);
                    if (slide) {
                        slide.aiRefined = {
                            bulletPoints: refined.bulletPoints,
                            speakerNotes: refined.speakerNotes
                        };
                    }
                });

                renderSlides();
                showMessage("✨ AI가 내용을 성공적으로 다듬었습니다!");

            } catch (error) {
                console.error(error);
                // 에러의 원인을 정확히 출력합니다. (예: API키 오류인지, 파싱 오류인지)
                showMessage(`AI 오류: ${error.message}`, true);
            } finally {
                hideLoading();
            }
        }

        // 실제 PPTX 파일 생성 함수 (PptxGenJS 사용)
        async function downloadPPT() {
            const topic = document.getElementById('presentation-topic').value.trim();
            if (!topic) {
                showMessage("발표 주제를 먼저 입력해주세요!", true);
                return;
            }

            // AI 정제가 안 된 슬라이드가 있는지 확인
            const needsAI = slidesData.some(s => s.aiRefined === null);
            if (needsAI) {
                // 팝업창(confirm)을 지우고, 대신 안내 메시지만 띄운 후 바로 만들도록 수정했습니다.
                showMessage("💡 AI로 다듬지 않은 슬라이드도 그대로 PPT에 포함됩니다.", false);
            }

            showLoading("멋진 파워포인트(PPT) 파일을 만들고 있습니다...");

            try {
                // 1. PPT 인스턴스 생성
                let pres = new PptxGenJS();
                pres.layout = 'LAYOUT_16x9';

                // 마스터 슬라이드(배경) 설정
                pres.defineSlideMaster({
                    title: "MASTER_SLIDE",
                    background: { color: "FFFFFF" },
                    objects: [
                        { rect: { x: 0, y: 0, w: '100%', h: 0.5, fill: { color: "22C55E" } } }, // 상단 초록색 띠
                        { text: { text: "발표 자료", options: { x: 0.5, y: 0.1, w: 3, h: 0.3, color: "FFFFFF", fontSize: 10 } } }
                    ]
                });

                // 2. 제목 슬라이드 추가
                let titleSlide = pres.addSlide({ masterName: "MASTER_SLIDE" });
                titleSlide.addText(topic, { x: 1, y: 2, w: 8, h: 1.5, fontSize: 44, bold: true, color: "1F2937", align: "center" });
                const userName = auth && auth.currentUser ? auth.currentUser.displayName : "발표자";
                titleSlide.addText(`발표자: ${userName}`, { x: 1, y: 3.5, w: 8, h: 1, fontSize: 24, color: "4B5563", align: "center" });

                // 3. 내용 슬라이드 추가
                slidesData.forEach(slideData => {
                    let slide = pres.addSlide({ masterName: "MASTER_SLIDE" });
                    
                    // 제목
                    slide.addText(slideData.title || "제목 없음", { x: 0.5, y: 0.8, w: 9, h: 0.8, fontSize: 32, bold: true, color: "166534" });

                    const hasText = slideData.types.includes('text');
                    const hasImage = slideData.types.includes('image');
                    const hasChart = slideData.types.includes('chart');
                    const hasMedia = hasImage || hasChart;

                    // 기본 텍스트 옵션
                    let contentOptions = { x: 0.5, y: 1.8, w: 9, h: 3.5, fontSize: 20, color: "374151", valign: "top" };
                    if (hasMedia && hasText) {
                        contentOptions.w = 4.5; // 미디어가 같이 있으면 텍스트는 왼쪽 절반만 차지
                    }

                    // 텍스트 내용 삽입
                    if (hasText || slideData.aiRefined) {
                        let textContent = "";
                        if (slideData.aiRefined) {
                            // PptxGenJS 오류 방지를 위해 배열 대신 줄바꿈 문자열(\n)로 변환
                            textContent = slideData.aiRefined.bulletPoints.join('\n');
                            contentOptions.bullet = true;
                            // 스피커 노트 추가
                            slide.addNotes(slideData.aiRefined.speakerNotes || "");
                        } else {
                            textContent = slideData.content;
                            contentOptions.bullet = false;
                        }
                        slide.addText(textContent, contentOptions);
                    }

                    // 시각자료 플레이스홀더 (네모 박스) 삽입
                    if (hasMedia) {
                        let mediaX = hasText ? 5.5 : 2.5; // 텍스트가 있으면 우측, 없으면 중앙
                        let mediaW = hasText ? 4 : 5;
                        
                        let mediaText = "";
                        if (hasImage && hasChart) mediaText = "사진/그림 및 표/그래프 삽입 공간";
                        else if (hasImage) mediaText = "사진/그림 삽입 공간";
                        else mediaText = "표/그래프 삽입 공간";

                        slide.addShape(pres.ShapeType.rect, { x: mediaX, y: 1.8, w: mediaW, h: 3, fill: { color: "F3F4F6" }, line: { color: "D1D5DB", width: 1 } });
                        slide.addText(mediaText, { x: mediaX, y: 1.8, w: mediaW, h: 3, align: "center", color: "9CA3AF", fontSize: 16 });
                    }
                });

                // 4. 마무리 슬라이드
                let endSlide = pres.addSlide({ masterName: "MASTER_SLIDE" });
                endSlide.addText("경청해 주셔서 감사합니다!", { x: 1, y: 2.5, w: 8, h: 1.5, fontSize: 40, bold: true, color: "1F2937", align: "center" });

                // 5. 파일 저장 및 다운로드
                await pres.writeFile({ fileName: `${topic}_발표자료.pptx` });
                showMessage("✅ PPT 다운로드가 완료되었습니다!");

            } catch (error) {
                console.error(error);
                showMessage(`PPT 오류: ${error.message}`, true);
            } finally {
                hideLoading();
            }
        }

        // 초기 화면 렌더링
        renderSlides();

    </script>
</body>
</html>
